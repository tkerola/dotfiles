# ==============================================================================
# General Settings
# ==============================================================================
# Set prefix to Ctrl-a like in screen
unbind C-b
set -g prefix C-a

# Ctrl-a + Ctrl-a
bind-key C-a last-window

# Ctrl-a + a
bind a send-prefix

# screen ^C c
unbind ^C
bind ^C new-window

# Ctrl-a space
unbind C-Space
bind C-Space next-window

# Ctrl-a backspace
unbind BSpace
bind BSpace previous-window

# Huge scrollback buffer
set -g history-limit 5000

# 256 colors
set -g default-terminal "screen-256color"

# Make bash the default shell
set -g default-shell "/bin/bash"

# Use hjkl in copy mode
setw -g mode-keys vi

# Use Prefix + Escape to enter copy mode (like GNU Screen)
bind Escape copy-mode

# Bind ']' to paste the copied text (matches Screen's default)
bind ] paste-buffer

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ==============================================================================
# Status Bar (Hardstatus)
# ==============================================================================
# Enable the status bar
set -g status on

# General background/foreground (Black/White)
set -g status-style bg=black,fg=white

# Left side: [Hostname] in green
set -g status-left-length 40
set -g status-left '#[fg=green][#H] '

# Center: Window list
# Inactive window (white text)
setw -g window-status-format '#[fg=white]#I #W'
# Active window (bold yellow text with asterisk)
setw -g window-status-current-format '#[fg=yellow,bold]#I*#W'

# Right side: [MM/DD HH:MM AM/PM] in blue and white, framed in green brackets
set -g status-right '#[fg=green][#[fg=blue]%m/%d #[fg=white]%I:%M %p#[fg=green]]'
